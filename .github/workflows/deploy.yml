name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # Keep legacy hash copies so cached browsers still get the fixed code
      - name: Copy bundle to legacy hashes
        run: |
          cd dist/assets
          NEW_JS=$(ls index-*.js | head -1)
          # Old hashes from broken deploys — serve fixed code under old names
          for OLD in BEdNaBXa D0JSevUK; do
            OLD_FILE="index-${OLD}.js"
            if [ "$NEW_JS" != "$OLD_FILE" ] && [ ! -f "$OLD_FILE" ]; then
              cp "$NEW_JS" "$OLD_FILE"
              echo "Copied $NEW_JS -> $OLD_FILE"
            fi
          done

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
