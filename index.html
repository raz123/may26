<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Quebec Fishing Spots</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      #app-loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 12px;
        background: #f0fdf4;
        font-family: Inter, system-ui, sans-serif;
        z-index: 99999;
      }
      .loading-spinner {
        width: 40px; height: 40px;
        border: 4px solid #bbf7d0;
        border-top-color: #059669;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-text {
        font-size: 14px; color: #059669; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="app"><div id="app-loading"><div class="loading-spinner"></div><div class="loading-text">Loading Quebec fishing spots...</div></div></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    // Inline stale-bundle detector — runs before app JS loads
    (function(){
      var SCRIPT_SRC = '/may26/assets/index-';
      var STALE_HASHES = ['BEdNaBXa','D0JSevUK','Bus79q79','DC01fIDd'];
      var scripts = document.getElementsByTagName('script');
      for (var i = 0; i < scripts.length; i++) {
        var src = scripts[i].src;
        if (src.indexOf(SCRIPT_SRC) >= 0) {
          for (var j = 0; j < STALE_HASHES.length; j++) {
            if (src.indexOf(STALE_HASHES[j]) >= 0) {
              // Found a stale cached script — force hard reload
              location.reload(true);
              break;
            }
          }
          break;
        }
      }
    })();
    </script>
  </body>
</html>
